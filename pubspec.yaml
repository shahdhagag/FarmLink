name: farmlink
description: "FarmLink - Connecting Farmers to Buyers"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.4.2
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  badges: ^3.1.2
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.2.0+3

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Location & Maps
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Network
  http: ^1.3.0
  dio: ^5.8.0
  connectivity_plus: ^6.1.4

  # Storage & Utils
  shared_preferences: ^2.5.2
  intl: ^0.18.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  collection: ^1.19.1

  # Weather
  weather_animation: ^1.1.1

  # Other
  custom_rating_bar: ^3.0.0
  flutter_launcher_icons: "^0.14.3"
  permission_handler: ^11.4.0
  google_nav_bar: ^5.0.7
  flutter_screenutil: ^5.9.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/iconLogo.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  #    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        #        - asset: assets/fonts/Poppins-Regular.ttf
        #        - asset: assets/fonts/Poppins-Medium.ttf
        #          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
#        - asset: assets/fonts/Poppins-Bold.ttf
#          weight: 700